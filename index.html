<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>专业量房工具</title>
<script src="https://cdn.jsdelivr.net/npm/three@0.159.0/build/three.min.js"></script>
<style>
:root{--p:#1a73e8;--pd:#1557b0;--pl:#e8f0fe;--ok:#0d904f;--okl:#e6f4ea;--wn:#e37400;--wnl:#fef7e0;--ng:#d93025;--ngl:#fce8e6;--g1:#f8fafc;--g2:#f1f5f9;--g3:#e2e8f0;--g4:#cbd5e1;--g5:#94a3b8;--g6:#64748b;--g7:#475569;--g8:#1e293b;--sh:0 1px 3px rgba(0,0,0,.08);--r:14px;--rs:10px}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC",sans-serif;background:var(--g2);color:var(--g8);line-height:1.6;padding-bottom:72px}
.hd{background:var(--p);color:#fff;padding:14px 16px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.1)}.hd h1{font-size:17px;font-weight:600}.hd .sub{font-size:11px;opacity:.85;margin-top:1px}
.ct{padding:14px;max-width:860px;margin:0 auto}.pg{display:none}.pg.on{display:block;animation:fi .25s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.cd{background:#fff;border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--sh)}
.c2{font-size:15px;font-weight:600;color:var(--p);margin-bottom:12px}
.fg{margin-bottom:12px}.fl{display:block;font-size:12px;font-weight:500;color:var(--g6);margin-bottom:5px}
.fi,.fs,.ft{width:100%;padding:11px 13px;border:1.5px solid var(--g4);border-radius:var(--rs);font-size:14px;background:#fff;-webkit-appearance:none}
.fi:focus,.fs:focus{outline:none;border-color:var(--p)}.ft{min-height:68px;resize:vertical}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.iu{position:relative}.iu .u{position:absolute;right:11px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--g5);pointer-events:none}.iu .fi{padding-right:36px}
.bt{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:11px 18px;border:none;border-radius:var(--rs);font-size:14px;font-weight:500;cursor:pointer;width:100%;transition:all .15s}
.bp{background:var(--p);color:#fff}.bp:active{background:var(--pd)}.bs{background:var(--ok);color:#fff}.bg2{background:var(--g3);color:var(--g7)}
.bsm{padding:7px 13px;font-size:13px}.bgrp{display:flex;gap:10px;margin-top:14px}.bgrp .bt{flex:1}
.bn{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;justify-content:space-around;padding:6px 0;box-shadow:0 -1px 8px rgba(0,0,0,.06);z-index:100;border-top:1px solid var(--g3)}
.ni{display:flex;flex-direction:column;align-items:center;gap:1px;padding:4px 10px;color:var(--g5);font-size:10px;cursor:pointer;border:none;background:none}.ni.on{color:var(--p)}.ni .ic{font-size:20px}
.pi{background:#fff;border-radius:var(--r);padding:13px 15px;margin-bottom:10px;box-shadow:var(--sh);cursor:pointer;border-left:4px solid var(--p);transition:transform .12s}.pi:active{transform:scale(.98)}
.pn{font-weight:600;font-size:14px}.pd{font-size:11px;color:var(--g6);margin-top:6px}
.pt{display:inline-block;padding:1px 7px;border-radius:4px;font-size:10px;background:var(--pl);color:var(--p)}
.es{text-align:center;padding:50px 20px;color:var(--g5)}.es .ic{font-size:42px;margin-bottom:10px;opacity:.5}
.ri{background:#fff;border-radius:var(--r);padding:13px;margin-bottom:10px;box-shadow:var(--sh);display:flex;justify-content:space-between;align-items:center}
.rnm{font-weight:600;font-size:14px}.rdt{font-size:11px;color:var(--g6);margin-top:3px}
.ra{display:flex;gap:7px}.ra button{width:34px;height:34px;border-radius:8px;border:none;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.be{background:var(--pl);color:var(--p)}.bdd{background:var(--ngl);color:var(--ng)}
.st2{font-size:13px;font-weight:600;color:var(--g7);margin:18px 0 10px;padding-bottom:5px;border-bottom:2px solid var(--pl)}
.tg{display:flex;background:var(--g3);border-radius:var(--rs);padding:3px}
.tb{flex:1;padding:7px;border:none;background:transparent;border-radius:7px;font-size:12px;cursor:pointer;transition:all .2s;color:var(--g6)}.tb.on{background:#fff;color:var(--p);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.tst{position:fixed;top:56px;left:50%;transform:translateX(-50%) translateY(-16px);background:var(--g8);color:#fff;padding:9px 18px;border-radius:8px;font-size:13px;z-index:300;opacity:0;transition:all .25s;pointer-events:none}
.tst.on{opacity:1;transform:translateX(-50%) translateY(0)}
/* DASHBOARD */
.dg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.dc{background:#fff;border-radius:var(--r);padding:14px;box-shadow:var(--sh)}.dc.f2{grid-column:1/-1}
.dc-t{font-size:11px;color:var(--g6);font-weight:500;margin-bottom:6px;letter-spacing:.3px}
.dc-v{font-size:28px;font-weight:700;line-height:1.1}.dc-u{font-size:12px;color:var(--g5);font-weight:400;margin-left:2px}
.dc-s{font-size:11px;color:var(--g5);margin-top:3px}
.gw{padding:10px 4px}.gb{width:100%;height:8px;background:var(--g3);border-radius:4px;position:relative;margin:8px 0 6px;overflow:visible}
.gf{height:100%;border-radius:4px;transition:width .6s ease;position:relative}
.gf.ok{background:var(--ok)}.gf.wn{background:var(--wn)}.gf.ng{background:var(--ng)}
.gm{position:absolute;top:-4px;width:14px;height:14px;border-radius:50%;border:2.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2);transform:translateX(-50%)}
.gll{display:flex;justify-content:space-between;width:100%;font-size:9px;color:var(--g5)}
.gs2{font-size:12px;font-weight:600;margin-top:2px}.gs2.ok{color:var(--ok)}.gs2.wn{color:var(--wn)}.gs2.ng{color:var(--ng)}
.mr{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--g2)}.mr:last-child{border-bottom:none}
.mic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.mf{flex:1;min-width:0}.mn2{font-size:11px;color:var(--g6)}.mv{font-size:15px;font-weight:600}.mrf{font-size:10px;color:var(--g5);margin-top:1px}
.mb{flex-shrink:0;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600}
.mb-ok{background:var(--okl);color:var(--ok)}.mb-wn{background:var(--wnl);color:var(--wn)}.mb-ng{background:var(--ngl);color:var(--ng)}
.ac{border-radius:var(--rs);padding:12px 14px;margin-bottom:8px;border-left:4px solid}
.ac.inf{background:var(--pl);border-color:var(--p)}.ac.ok{background:var(--okl);border-color:var(--ok)}
.ac.wn{background:var(--wnl);border-color:var(--wn)}.ac.ng{background:var(--ngl);border-color:var(--ng)}
.ac-t{font-size:13px;font-weight:600;margin-bottom:4px}.ac-b{font-size:12px;color:var(--g7);line-height:1.7}.ac-b p{margin-bottom:3px}
.ac-r{font-size:10px;color:var(--g5);margin-top:5px;font-style:italic}
.rtt{display:flex;gap:6px;overflow-x:auto;padding:0 0 10px;margin-bottom:4px;-webkit-overflow-scrolling:touch}
.rtt::-webkit-scrollbar{display:none}
.rt2{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid var(--g3);background:#fff;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .2s;color:var(--g6)}
.rt2.on{background:var(--p);color:#fff;border-color:var(--p);font-weight:600}
.rh{margin:-14px -14px 18px;text-align:center;padding:22px 16px;background:var(--p);color:#fff}.rh h2{font-size:18px;margin-bottom:3px}.rh p{font-size:12px;opacity:.9}
.rs2{margin-bottom:18px;page-break-inside:avoid}
.rs2 h3{font-size:14px;color:var(--p);border-bottom:2px solid var(--pl);padding-bottom:5px;margin-bottom:10px}
.rtb{width:100%;border-collapse:collapse;font-size:12px}
.rtb th,.rtb td{padding:7px 9px;text-align:left;border-bottom:1px solid var(--g3)}
.rtb th{background:var(--g1);font-weight:600;color:var(--g7);font-size:11px}
.rsb{background:var(--pl);border-radius:var(--rs);padding:14px;margin-top:10px}.rsb h4{color:var(--p);font-size:13px;margin-bottom:6px}
.rdh{display:inline-block;background:var(--pl);color:var(--p);padding:0 5px;border-radius:3px;font-weight:600}
.drr{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--g3);font-size:13px}.drr:last-child{border-bottom:none}
.dl{color:var(--g6)}.dv2{font-weight:500}
.rt{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:12px}
.ri2{background:linear-gradient(135deg,#f0f7ff,#fff);border:1px solid var(--pl);border-radius:var(--rs);padding:10px 12px;text-align:center}
.ri2-ic{font-size:20px;margin-bottom:4px}.ri2-t{font-size:11px;color:var(--g6);margin-bottom:2px}.ri2-d{font-size:12px;font-weight:600;color:var(--p);line-height:1.4}
.cvC{background:linear-gradient(135deg,#f0f4f8,#e8ecf1);border-radius:var(--rs);padding:12px;margin-top:12px;border:1px solid var(--g3);position:relative;overflow:visible}
.cvC canvas{border-radius:8px;background:#0d1117;display:block;width:100%;height:360px;touch-action:none;cursor:grab}
.cvC canvas:active{cursor:grabbing}
.cvT{font-size:13px;font-weight:600;color:var(--g7);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.cvL{font-size:10px;color:var(--g5);margin-top:6px}
.cvCtrl{display:flex;gap:6px;align-items:center;margin-top:8px;flex-wrap:wrap}
.cvBtn{padding:5px 10px;border-radius:6px;border:1px solid var(--g4);background:#fff;font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap}
.cvBtn:hover{border-color:var(--p);color:var(--p)}
.cvBtn.on{background:var(--p);color:#fff;border-color:var(--p)}
.cvBtn.on.cool{background:#1565c0;border-color:#1565c0}
.cvBtn.on.heat{background:#e65100;border-color:#e65100}
.cvSlider{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--g6)}
.cvSlider input[type=range]{width:70px;accent-color:var(--p);height:4px}
.cvSep{width:1px;height:20px;background:var(--g3);margin:0 2px}
.ac-wrap{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ac-wrap .ac{margin-bottom:0}
@media print{.bn,.hd,.bgrp{display:none!important}body{padding-bottom:0;background:#fff;color:#222}.ct{max-width:100%;padding:0}.cd,.dc{box-shadow:none;border:1px solid #ddd;background:#fff}.ri,.pi{background:#fff;border-color:#ddd}.ac{background:#f8f8f8}.rt2{border-color:#ccc}}
@media(min-width:768px){.dg{grid-template-columns:1fr 1fr 1fr}.fr3{grid-template-columns:1fr 1fr 1fr 1fr}}
</style>
</head>
<body>
<div class="hd"><h1>专业量房工具</h1><div class="sub">环境数据采集 · 国标对比分析 · 设计建议</div></div>
<div class="ct">
<div class="pg on" id="pg-pj"  data-pc=><div class="cd np2"><div style="display:flex;justify-content:space-between;align-items:center"><h2 style="font-size:17px">量房项目</h2><button class="bt bp bsm" style="width:auto" onclick="showNP()">+ 新建</button></div></div><div id="pjL"></div><div class="es" id="esP" style="display:none"><div class="ic">📋</div><p>暂无项目</p></div></div>
<div class="pg" id="pg-pjf"><div class="cd"><div class="c2">🏠 项目信息</div><div class="fg"><label class="fl">客户姓名 *</label><input class="fi" id="cN" placeholder="请输入"></div><div class="fr"><div class="fg"><label class="fl">电话 *</label><input class="fi" id="cP" type="tel"></div><div class="fg"><label class="fl">日期</label><input class="fi" id="sD" type="date"></div></div><div class="fg"><label class="fl">地址 *</label><input class="fi" id="ad"></div><div class="fr"><div class="fg"><label class="fl">类型</label><select class="fs" id="hT"><option>平层</option><option>复式</option><option>别墅</option><option>公寓</option><option>商用</option></select></div><div class="fg"><label class="fl">面积</label><div class="iu"><input class="fi" id="aT" type="number"><span class="u">m²</span></div></div></div><div class="fr"><div class="fg"><label class="fl">楼层</label><input class="fi" id="fl2" type="number"></div><div class="fg"><label class="fl">总楼层</label><input class="fi" id="tf2" type="number"></div></div><div class="fg"><label class="fl">顾问</label><input class="fi" id="adv2"></div><div class="fg"><label class="fl">备注</label><textarea class="ft" id="pN"></textarea></div><div class="bgrp"><button class="bt bg2" onclick="goH()">取消</button><button class="bt bp" onclick="savePj()">保存并继续</button></div></div></div>
<div class="pg" id="pg-rm"><div class="cd np2"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div><h2 style="font-size:17px" id="rmT">房间测量</h2></div><button class="bt bp bsm" style="width:auto" onclick="showRF()">+ 添加房间</button></div></div><div id="rmL"></div><div class="bgrp np2" id="rmA" style="display:none"><button class="bt bg2" onclick="goH()">返回</button><button class="bt bp" onclick="goA()">查看分析</button></div></div>
<div class="pg" id="pg-rf"><div class="cd"><div class="c2">📐 房间测量</div><input type="hidden" id="rId"><div class="fg"><label class="fl">房间 *</label><select class="fs" id="rNm"><option value="">选择</option><option>客厅</option><option>主卧</option><option>次卧</option><option>书房</option><option>儿童房</option><option>餐厅</option><option>厨房</option><option>卫生间</option><option>阳台</option><option value="其他">其他</option></select></div><div class="fg" id="crng" style="display:none"><input class="fi" id="rCn" placeholder="输入房间名称"></div><div class="st2">📏 空间</div><div class="fr3"><div class="fg"><label class="fl">长</label><div class="iu"><input class="fi" id="rL" type="number" step="0.01" onchange="cA()"><span class="u">m</span></div></div><div class="fg"><label class="fl">宽</label><div class="iu"><input class="fi" id="rW" type="number" step="0.01" onchange="cA()"><span class="u">m</span></div></div><div class="fg"><label class="fl">层高</label><div class="iu"><input class="fi" id="rH" type="number" step="0.01"><span class="u">m</span></div></div></div><div class="fr"><div class="fg"><label class="fl">面积</label><div class="iu"><input class="fi" id="rA" type="number" step="0.01" readonly style="background:var(--g1)"><span class="u">m²</span></div></div><div class="fg"><label class="fl">朝向</label><select class="fs" id="rDr"><option>东</option><option selected>南</option><option>西</option><option>北</option><option>东南</option><option>东北</option><option>西南</option><option>西北</option></select></div></div><div class="st2">🌡️ 温湿度</div><div class="fr"><div class="fg"><label class="fl">室内温度</label><div class="iu"><input class="fi" id="tI" type="number" step="0.1"><span class="u">°C</span></div></div><div class="fg"><label class="fl">室内湿度</label><div class="iu"><input class="fi" id="hI" type="number" step="0.1"><span class="u">%</span></div></div></div><div class="fr"><div class="fg"><label class="fl">室外温度</label><div class="iu"><input class="fi" id="tO" type="number" step="0.1"><span class="u">°C</span></div></div><div class="fg"><label class="fl">室外湿度</label><div class="iu"><input class="fi" id="hO" type="number" step="0.1"><span class="u">%</span></div></div></div><div class="st2">💨 通风</div><div class="fg"><label class="fl">室外风速</label><div class="iu"><input class="fi" id="wI" type="number" step="0.1" placeholder="0表示无风/气流不通畅"><span class="u">m/s</span></div></div><div class="st2">🔊 噪音</div><div class="fr"><div class="fg"><label class="fl">背景噪音</label><div class="iu"><input class="fi" id="nA" type="number" step="0.1"><span class="u">dB(A)</span></div></div><div class="fg"><label class="fl">设备噪音</label><div class="iu"><input class="fi" id="nE" type="number" step="0.1"><span class="u">dB(A)</span></div></div></div><div class="st2">🏗️ 结构</div><div class="fg"><label class="fl">墙体</label><div class="tg" id="tgW"><button class="tb on" onclick="sTg(this,'wT2','砖墙')">砖墙</button><button class="tb" onclick="sTg(this,'wT2','混凝土')">混凝土</button><button class="tb" onclick="sTg(this,'wT2','轻钢')">轻钢</button></div><input type="hidden" id="wT2" value="砖墙"></div><div class="fg"><label class="fl">钢筋</label><select class="fs" id="rS"><option value="正常">正常</option><option value="密集">密集</option><option value="主筋位">主筋位</option><option value="未检测">未检测</option></select></div><div class="fg"><label class="fl">梁体</label><input class="fi" id="bP2" placeholder="如：南侧有圈梁"></div><div class="st2">🪟 窗户</div><div class="fr"><div class="fg"><label class="fl">窗户面积</label><div class="iu"><input class="fi" id="wAr" type="number" step="0.01"><span class="u">m²</span></div></div><div class="fg"><label class="fl">类型</label><select class="fs" id="wTy"><option>单层玻璃</option><option selected>双层中空</option><option>三层中空</option><option>落地窗</option><option>飘窗</option></select></div></div><div class="st2">⚡ 现有空调</div><div class="fg"><div class="tg" id="tgA"><button class="tb on" onclick="sTg(this,'hAc','无')">无</button><button class="tb" onclick="sTg(this,'hAc','分体机')">分体机</button><button class="tb" onclick="sTg(this,'hAc','中央空调')">中央空调</button><button class="tb" onclick="sTg(this,'hAc','其他')">其他</button></div><input type="hidden" id="hAc" value="无"></div><div class="fg"><label class="fl">痛点</label><textarea class="ft" id="pPt"></textarea></div><div class="fg"><label class="fl">备注</label><textarea class="ft" id="rNt"></textarea></div><div class="bgrp"><button class="bt bg2" onclick="goRms()">取消</button><button class="bt bp" onclick="saveRm()">保存</button></div></div></div>
<div class="pg" id="pg-an"><div id="anC"></div><div class="bgrp np2" style="margin-top:14px"><button class="bt bg2" onclick="goRms()">返回</button><button class="bt bp" onclick="goRpt()">完整报告</button></div></div>
<div class="pg" id="pg-rpt"><div id="rptC"></div><div class="bgrp np2" style="margin-top:18px"><button class="bt bg2" onclick="goA()">返回</button><button class="bt bs" onclick="window.print()">打印/PDF</button></div></div>
</div>
<div class="bn np2"><button class="ni on" onclick="goH()"><span class="ic">📋</span><span>项目</span></button><button class="ni" onclick="if(cPid)goRms()"><span class="ic">📐</span><span>测量</span></button><button class="ni" onclick="if(cPid)goA()"><span class="ic">📊</span><span>分析</span></button><button class="ni" onclick="if(cPid)goRpt()"><span class="ic">📄</span><span>报告</span></button></div>
<div class="tst" id="tst"></div>
<script>
const GB={noise:{sleep:33,daily:40},wind:{summer:.3,winter:.2}};
const sn=()=>(new Date().getMonth()>=5&&new Date().getMonth()<=10)?'summer':'winter';
const gN=nm=>/卧|房|书房|儿童/.test(nm)?GB.noise.sleep:GB.noise.daily;
const gW=()=>sn()==='summer'?GB.wind.summer:GB.wind.winter;
let P=JSON.parse(localStorage.getItem('daikin_projects')||'[]'),cPid=null,cRid=null;
const $=id=>document.getElementById(id);
function sp(id){document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));$(id).classList.add('on');document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));const m={'pg-pj':0,'pg-rm':1,'pg-rf':1,'pg-an':2,'pg-rpt':3};document.querySelectorAll('.ni')[m[id]||0].classList.add('on');window.scrollTo(0,0)}
function goH(){sp('pg-pj');rPj()}function goRms(){if(!cPid)return;sp('pg-rm');rRms()}function goA(){if(!cPid)return;sp('pg-an');rAn()}function goRpt(){if(!cPid)return;sp('pg-rpt');rRpt()}
function toast(m){const t=$('tst');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2200)}
function esc(t){if(!t)return'';const d=document.createElement('div');d.textContent=t;return d.innerHTML}
function fmtD(d){if(!d)return'-';const v=new Date(d);return isNaN(v)?d:`${v.getFullYear()}-${String(v.getMonth()+1).padStart(2,'0')}-${String(v.getDate()).padStart(2,'0')}`}

  function resetP(p){
    var dv=getDirVec();
    p.x=oc.x+(Math.random()-0.5)*acW*0.5;
    p.y=oc.y+(Math.random()-0.5)*0.05;
    p.z=oc.z+(Math.random()-0.5)*acW*0.5;
    var spd=(0.012+Math.random()*0.006)*state.speed;
    var lateral=(Math.random()-0.5)*spd*0.3;
    p.vx=dv.fx*spd+dv.rx*lateral;
    p.vy=dv.fy*spd*(state.isCool?1:-1);
    p.vz=dv.fz*spd+dv.rxz*lateral;
    if(!state.isCool)p.vy=Math.abs(p.vy);
    p.life=0.8+Math.random()*0.5;p.age=0;p.phase='supply';p.temp=0;
  }
  for(var i=0;i<PCOUNT;i++){pData.push({x:0,y:0,z:0,vx:0,vy:0,vz:0,life:0,age:0,phase:'supply',temp:0});resetP(pData[i]);pData[i].life=Math.random();}
  // ====== STREAMLINES ======
  function rebuildSL(){
    while(aGroup.children.length>1)aGroup.remove(aGroup.children[1]);
    var slColor=state.isCool?0x42a5f5:0xff7043;
    var slMat=new THREE.MeshPhongMaterial({color:slColor,transparent:true,opacity:0.2});
    var dv=getDirVec();
    var slCount=8;
    for(var s=0;s<slCount;s++){
      var pts=[];var t=(s-slCount/2+0.5)/slCount;
      var px=oc.x,py=oc.y,pz=oc.z+t*acW*0.4;
      var vx=dv.fx*0.015*state.speed,vy=dv.fy*0.015*state.speed,vz=0;
      for(var j=0;j<120;j++){
        pts.push(new THREE.Vector3(px,py,pz));
        if(state.isCool)vy-=0.0003;else vy+=0.0005;
        vx+=(Math.random()-0.5)*0.0008;
        vz+=(Math.random()-0.5)*0.0005;
        px+=vx;py+=vy;pz+=vz;
        if(py<0.05){py=0.05;vy=Math.abs(vy)*0.3;}
        if(py>rh-0.05){py=rh-0.05;vy=-Math.abs(vy)*0.3;}
        if(Math.abs(px)>rl/2-0.05){px=Math.sign(px)*(rl/2-0.05);vx*=-0.3;}
        if(Math.abs(pz)>rw/2-0.05){pz=Math.sign(pz)*(rw/2-0.05);vz*=-0.3;}
      }
      if(pts.length<3)continue;
      var curve=new THREE.CatmullRomCurve3(pts);
      var tube=new THREE.Mesh(new THREE.TubeGeometry(curve,80,0.006,4,false),slMat);
      aGroup.add(tube);
    }
  }
  rebuildSL();
  // ====== ANIMATE ======
  var animId;
  function animate(){
    animId=requestAnimationFrame(animate);
    ledMat.emissiveIntensity=0.5+Math.sin(Date.now()*0.003)*0.35;
    var lc=state.isCool?0x1a73e8:0xff6d00;
    ledMat.color.setHex(lc);ledMat.emissive.setHex(lc);acLight.color.setHex(lc);
    var dv=getDirVec();
    for(var i=0;i<PCOUNT;i++){
      var p=pData[i];p.age++;p.life-=0.002;
      if(p.life<=0){if(Math.random()<0.25){p.phase='return';p.vy*=0.1;}else{resetP(p);}continue;}
      if(p.phase==='supply'){
        p.vy+=(dv.fy*0.014*state.speed-p.vy)*0.015;
        if(state.isCool){p.vy-=0.00015;if(p.y<-rh/2+0.1){p.y=-rh/2+0.1;p.vy=0;}}
        else{p.vy+=0.00035;if(p.y>rh/2-0.1){p.y=rh/2-0.1;p.vy=-0.0005;}}
      }
      p.vx+=(Math.random()-0.5)*0.0006;p.vy+=(Math.random()-0.5)*0.0003;p.vz+=(Math.random()-0.5)*0.0005;
      p.vx*=0.994;p.vy*=0.994;p.vz*=0.994;
      p.x+=p.vx;p.y+=p.vy;p.z+=p.vz;
      if(p.x<-rl/2+0.05){p.x=-rl/2+0.05;p.vx=Math.abs(p.vx)*0.2;}
      if(p.x>rl/2-0.05){p.x=rl/2-0.05;p.vx=-Math.abs(p.vx)*0.2;}
      if(p.y<-rh/2+0.05){p.y=-rh/2+0.05;p.vy=Math.abs(p.vy)*0.15;}
      if(p.y>rh/2-0.05){p.y=rh/2-0.05;p.vy=-Math.abs(p.vy)*0.2;}
      if(p.z<-rw/2+0.05){p.z=-rw/2+0.05;p.vz=Math.abs(p.vz)*0.2;}
      if(p.z>rw/2-0.05){p.z=rw/2-0.05;p.vz=-Math.abs(p.vz)*0.2;}
      p.temp+=state.isCool?0.0015:0.001;if(p.temp>1)p.temp=1;
      pPos[i*3]=p.x;pPos[i*3+1]=p.y;pPos[i*3+2]=p.z;
      var t=p.temp;
      if(state.isCool){pCol[i*3]=0.15+0.25*(1-t);pCol[i*3+1]=0.4+0.35*(1-t);pCol[i*3+2]=0.75+0.25*(1-t);}
      else{pCol[i*3]=0.85+0.15*t;pCol[i*3+1]=0.25+0.2*(1-t);pCol[i*3+2]=0.08+0.05*(1-t);}
    }
    pGeom.attributes.position.needsUpdate=true;
    pGeom.attributes.color.needsUpdate=true;
    renderer.render(scene,camera);
  }
  animate();
  _3dInstances.push({renderer:renderer,anim:animId,cvs:canvasEl});
  // ====== CONTROLS ======
  var ctrl=document.createElement('div');ctrl.className='cvCtrl';
  ctrl.innerHTML=
    '<button class="cvBtn cool on" data-m="cool">❄ 制冷</button>'+
    '<button class="cvBtn heat" data-m="heat">🔥 制热</button>'+
    '<div class="cvSep"></div>'+
    '<button class="cvBtn on" data-d="front">↓下吹</button>'+
    '<button class="cvBtn" data-d="horizontal">→水平</button>'+
    '<button class="cvBtn" data-d="up">↑上吹</button>'+
    '<div class="cvSep"></div>'+
    '<button class="cvBtn" data-v="top">俯视</button>'+
    '<button class="cvBtn" data-v="front">正视</button>'+
    '<button class="cvBtn" data-v="side">侧视</button>'+
    '<button class="cvBtn" data-v="iso">透视</button>'+
    '<div class="cvSep"></div>'+
    '<div class="cvSlider"><span>风速</span><input type="range" min="0.3" max="2" step="0.1" value="1" class="cvSpd"><span class="cvSpdV">1.0</span></div>'+
    '<div class="cvSlider"><span>透明</span><input type="range" min="0.1" max="0.8" step="0.05" value="0.35" class="cvWOp"></div>';
  container.appendChild(ctrl);
  // Mode
  ctrl.querySelectorAll('[data-m]').forEach(function(btn){
    btn.addEventListener('click',function(){
      state.isCool=this.dataset.m==='cool';
      ctrl.querySelectorAll('[data-m]').forEach(function(b){b.classList.remove('on');});
      this.classList.add('on');rebuildSL();
    });
  });
  // Direction
  ctrl.querySelectorAll('[data-d]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var dd=this.dataset.d;
      if(dd==='front')state.angle=60;else if(dd==='horizontal')state.angle=5;else if(dd==='up')state.angle=85;
      ctrl.querySelectorAll('[data-d]').forEach(function(b){b.classList.remove('on');});
      this.classList.add('on');rebuildSL();
    });
  });
  // View
  ctrl.querySelectorAll('[data-v]').forEach(function(btn){
    btn.addEventListener('click',function(){setView(this.dataset.v);});
  });
  // Speed
  ctrl.querySelector('.cvSpd').addEventListener('input',function(){
    state.speed=parseFloat(this.value);
    ctrl.querySelector('.cvSpdV').textContent=state.speed.toFixed(1);rebuildSL();
  });
  // Wall opacity
  ctrl.querySelector('.cvWOp').addEventListener('input',function(){
    var v=parseFloat(this.value);state.wallOp=v;
    walls.forEach(function(w){w.material.opacity=v;w.material.depthWrite=v>0.7;});
  });
}

// ====== GAUGE HELPER ======
function gaugeHtml(val,min,max,goodR,label,unit){
  const pct=Math.min(100,Math.max(0,((val-min)/(max-min))*100));
  const inGood=val>=goodR[0]&&val<=goodR[1];
  const lv=inGood?'ok':(val<goodR[0]-5||val>goodR[1]+5?'ng':'wn');
  const cls=lv==='ok'?'ok':lv==='wn'?'wn':'ng';
  const mColor=lv==='ok'?'var(--ok)':lv==='wn'?'var(--wn)':'var(--ng)';
  const mLeft=Math.min(100,Math.max(0,pct));
  const statusTxt=inGood?'达标':(lv==='wn'?'偏离':'超标');
  return`<div class="gw"><div class="dc-t">${label}</div><div style="font-size:22px;font-weight:700;text-align:center">${val!==undefined&&val!==null?val:'--'}<span style="font-size:11px;color:var(--g5);font-weight:400">${unit}</span></div><div class="gb"><div class="gf ${cls}" style="width:${mLeft}%"></div><div class="gm" style="left:${mLeft}%;background:${mColor}"></div></div><div class="gll"><span>${min}${unit}</span><span style="color:var(--${lv==='ok'?'ok':'ng'})">${goodR[0]}-${goodR[1]}${unit}</span><span>${max}${unit}</span></div><div class="gs2 ${cls}">${statusTxt}</div></div>`;
}

  $('anC').innerHTML=html;

  if(p2)(p2.rooms||[]).forEach(r=>{const el=document.getElementById('cv-'+r.id);if(el)drawRoomCV('cv-'+r.id,r,az(r));});

    rmsHtml+=`</div>`;
    // Room model in report
    rmsHtml+=`<div class="cvC" style="margin-top:12px"><div class="cvT">🏗️ 3D气流模拟 · ${esc(r.nm)}</div><div id="cvr-${r.id}" style="width:100%;height:360px;border-radius:8px;overflow:hidden"></div><div class="cvL">🖱️拖拽旋转 · 🔍滚轮缩放 · 可切换模式/风向/视角</div></div>`;
    rmsHtml+=`</div>`;
  });
  // Project advice
  let projAdvHtml='';
  if(allAdv.length){
    projAdvHtml=`<div class="rs2"><h3>设计建议汇总</h3>`;
    allAdv.forEach(a=>{const cls=a.t==='ng'?'ng':a.t==='wn'?'wn':'inf';
      projAdvHtml+=`<div class="ac ${cls}" style="margin-bottom:6px"><div class="ac-t">${a.tt}</div><div class="ac-b">${a.b}</div>${a.rf?`<div class="ac-r">依据：${a.rf}</div>`:''}</div>`});
    projAdvHtml+=`</div>`;
  }
  $('rptC').innerHTML=`
    <div class="rh"><h2>专业量房报告</h2><p>${esc(p.cn)} | ${esc(p.ad2)}</p><p style="margin-top:4px">${fmtD(p.sd)} | 顾问：${esc(p.adv||'')}</p></div>
    <div class="rs2"><h3>一、项目信息</h3>
      <div class="drr"><span class="dl">客户</span><span class="dv2">${esc(p.cn)}</span></div>
      <div class="drr"><span class="dl">地址</span><span class="dv2">${esc(p.ad2)}</span></div>
      <div class="drr"><span class="dl">类型</span><span class="dv2">${esc(p.ht)} ${p.at?p.at+'m²':''}</span></div>
      <div class="drr"><span class="dl">楼层</span><span class="dv2">${p.fl||'-'} / ${p.tf||'-'}</span></div>
      <div class="drr"><span class="dl">测量</span><span class="dv2">${rms.length}间 / ${Math.round(tA)}m² / ${Math.round(tL)}W</span></div>
    </div>
    <div class="rs2"><h3>二、房间数据与国标对比</h3>${rmsHtml}</div>
    ${projAdvHtml}
    <div class="rs2"><h3>三、总体评估</h3><div class="rsb"><h4>配置建议</h4>
      <p style="font-size:13px">本房屋共${rms.length}间，${Math.round(tA)}m²，总冷负荷约${Math.round(tL)}W。以上建议基于现场实测数据与国标对比分析，最终选型请结合专业设计深化。</p>
    </div></div>
    <div style="text-align:center;margin-top:36px;color:var(--ink3);font-size:11px"><p>— 由空气顾问现场量房后生成 —</p></div>`;
  const p2=P.find(x=>x.id===cPid);
  dispose3D();
  if(p2)(p2.rooms||[]).forEach(r=>{const el=document.getElementById('cvr-'+r.id);if(el)drawRoomCV('cvr-'+r.id,r,az(r));});
}
rPj();
</script>
